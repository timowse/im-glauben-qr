<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>ImGlauben – Hirtenkonferenz</title>
  <link rel="icon" href="https://im-glauben.de/cdn/shop/files/www.im-glauben.de_1.jpg?v=1737767526" />
  <link rel="apple-touch-icon" href="https://im-glauben.de/cdn/shop/files/www.im-glauben.de_1.jpg?v=1737767526" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:        #ede8e0;
      --white:     #ffffff;
      --dark:      #1c1c1c;
      --mid:       #5a5a5a;
      --muted:     #999;
      --border:    #cec9c1;
      --gold:      #b8975a;
      --gold-bg:   #f5edd8;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      font-family: 'Nunito', sans-serif;
      color: var(--dark);
      display: flex;
      align-items: stretch;
      height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ── LEFT PANEL ────────────────────────────── */
    .left {
      flex: 1 1 45%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(24px, 4vw, 56px) clamp(20px, 3.5vw, 48px);
      gap: clamp(12px, 2vh, 22px);
    }

    /* Logo */
    .logo-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }

    .logo-img {
      /* Full square image, no cropping */
      width: clamp(80px, 11vw, 150px);
      height: auto;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      object-position: center;
      display: block;
    }

    .brand-name {
      font-family: 'Instrument Sans', sans-serif;
      font-size: clamp(22px, 3.2vw, 42px);
      font-weight: 600;
      letter-spacing: 0.02em;
      line-height: 1;
    }

    .tagline {
      font-size: clamp(11px, 1.1vw, 15px);
      color: var(--muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-weight: 400;
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* Offer block */
    .offer-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .discount {
      font-family: 'Instrument Sans', sans-serif;
      font-size: clamp(36px, 6vw, 82px);
      font-weight: 600;
      line-height: 1;
      color: var(--dark);
    }

    .discount em {
      font-style: normal;
      color: var(--gold);
    }

    .discount-label {
      font-size: clamp(13px, 1.4vw, 18px);
      font-weight: 500;
      color: var(--mid);
      letter-spacing: 0.01em;
    }

    /* Event badge */
    .event-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--gold-bg);
      border: 1.5px solid var(--gold);
      border-radius: 100px;
      padding: clamp(5px, 0.8vh, 8px) clamp(12px, 1.5vw, 20px);
      width: fit-content;
    }

    .event-badge .cross {
      color: var(--gold);
      font-size: clamp(12px, 1.1vw, 16px);
    }

    .event-badge span {
      font-family: 'Instrument Sans', sans-serif;
      font-size: clamp(11px, 1vw, 14px);
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* URL chip */
    .url-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      width: fit-content;
      background: rgba(0,0,0,0.05);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: clamp(5px, 0.7vh, 8px) clamp(12px, 1.4vw, 18px);
      font-family: 'Instrument Sans', sans-serif;
      font-size: clamp(12px, 1.1vw, 15px);
      font-weight: 500;
      color: var(--mid);
      text-decoration: none;
    }

    /* Fine print */
    .fine-print {
      font-size: clamp(10px, 0.85vw, 13px);
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── SEPARATOR ─────────────────────────────── */
    .sep {
      width: 1px;
      background: var(--border);
      flex-shrink: 0;
      margin: clamp(20px, 3vh, 40px) 0;
    }

    /* ── RIGHT PANEL ───────────────────────────── */
    .right {
      flex: 1 1 55%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(24px, 4vw, 56px) clamp(20px, 3.5vw, 52px);
      gap: clamp(12px, 2vh, 20px);
    }

    /* QR frame */
    .qr-frame {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: clamp(16px, 2.5vw, 32px);
      box-shadow: 0 6px 32px rgba(0,0,0,0.08);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* gold corner accents */
    .qr-frame::before,
    .qr-frame::after,
    .qr-frame .corner-bl,
    .qr-frame .corner-tr {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      border-color: var(--gold);
      border-style: solid;
    }
    .qr-frame::before { top: 12px; left: 12px; border-width: 2px 0 0 2px; border-radius: 3px 0 0 0; }
    .qr-frame::after  { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; border-radius: 0 0 3px 0; }
    .qr-frame .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; border-radius: 0 0 0 3px; }
    .qr-frame .corner-tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; border-radius: 0 3px 0 0; }

    #qrCanvas, #qrImg {
      display: block;
      border-radius: 4px;
    }

    .scan-hint {
      font-size: clamp(11px, 1vw, 14px);
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-align: center;
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 360px;
    }
    .scan-hint::before,
    .scan-hint::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>

  <!-- LEFT -->
  <div class="left">

    <div class="logo-block">
      <img
        class="logo-img"
        src="https://im-glauben.de/cdn/shop/files/www.im-glauben.de_1.jpg?v=1737767526"
        alt="ImGlauben Logo"
        loading="eager"
      />
      <div class="brand-name">ImGlauben</div>
      <div class="tagline">Christliche Geschenk- &amp; Dekoartikel</div>
    </div>

    <div class="divider"></div>

    <div class="offer-block">
      <div class="discount"><em>20&thinsp;%</em> auf alles</div>
      <div class="discount-label">Exklusiv während der Hirtenkonferenz</div>
    </div>

    <div class="event-badge">
      <span class="cross">✝</span>
      <span>Hirtenkonferenz – Sonderangebot</span>
    </div>

    <a class="url-chip" href="https://im-glauben.de" target="_blank">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      im-glauben.de
    </a>

    <div class="fine-print">
      Kein Code nötig – der Rabatt<br />
      wird automatisch im Shop angezeigt.
    </div>

  </div>

  <!-- SEPARATOR -->
  <div class="sep"></div>

  <!-- RIGHT -->
  <div class="right">

    <div class="qr-frame">
      <div class="corner-bl"></div>
      <div class="corner-tr"></div>
      <canvas id="qrCanvas"></canvas>
    </div>

    <div class="scan-hint">Jetzt scannen &amp; sparen</div>

  </div>

  <script>
    const TARGET = "https://im-glauben.de";

    function qrSize() {
      // Fill roughly 72% of the shorter viewport side (height in landscape)
      return Math.floor(Math.min(window.innerHeight * 0.72, window.innerWidth * 0.42, 420));
    }

    function fallback(size) {
      const canvas = document.getElementById('qrCanvas');
      const img = document.createElement('img');
      img.id = 'qrImg';
      img.src = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(TARGET)}&qzone=1&color=1c1c1c&bgcolor=ffffff`;
      img.width = size;
      img.height = size;
      img.alt = 'QR Code für im-glauben.de';
      canvas.replaceWith(img);
    }

    function render() {
      const size = qrSize();
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js';
      s.onload = () => {
        QRCode.toCanvas(document.getElementById('qrCanvas'), TARGET, {
          width: size,
          margin: 1,
          color: { dark: '#1c1c1c', light: '#ffffff' },
          errorCorrectionLevel: 'H'
        }, err => { if (err) fallback(size); });
      };
      s.onerror = () => fallback(size);
      document.head.appendChild(s);
    }

    // Wait for fonts/layout to settle
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', render);
    } else {
      render();
    }

    // Re-render on orientation change
    window.addEventListener('orientationchange', () => setTimeout(render, 300));
  </script>

</body>
</html>
